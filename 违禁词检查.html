<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大健康违禁词检查</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0eb;--surface:#fff;--border:#e2dbd2;
  --text:#3d3730;--text2:#8a8078;
  --primary:#8a9e8b;--primary-hover:#7a8e7b;--primary-light:#eef3ee;
  --red:#c4706a;--yellow:#b89a6a;--green:#7a9e7a;
  --radius:8px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;
}

/* Login overlay */
#loginOv{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;
}
#loginOv.hidden{display:none}#app{display:none}
.lc{
  background:#fff;border-radius:16px;padding:44px 40px;width:100%;max-width:380px;
  box-shadow:0 8px 40px rgba(61,55,48,.08);border:1px solid var(--border);
}
.lc .logo{font-size:36px;text-align:center;margin-bottom:8px}
.lc h1{font-size:20px;font-weight:700;color:var(--text);text-align:center;letter-spacing:1px}
.lc .sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:28px}
.lc label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;letter-spacing:.5px}
.lc input{
  width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;
  font-size:14px;font-family:inherit;transition:all .2s;background:#faf8f6;margin-bottom:14px;
}
.lc input:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(138,158,139,.15)}
.lc .btn{
  width:100%;padding:11px;border:none;border-radius:8px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;background:var(--primary);color:#fff;
  transition:all .15s;letter-spacing:.5px;margin-top:4px;
}
.lc .btn:hover{background:var(--primary-hover)}
.lc .err{color:var(--red);font-size:12px;text-align:center;min-height:18px;margin-bottom:4px}
.lc .ok{color:var(--green);font-size:12px;text-align:center;min-height:18px;margin-bottom:4px}
.lc .lnk{text-align:center;font-size:13px;margin-top:16px;color:var(--text2)}
.lc .lnk a{color:var(--primary);cursor:pointer;text-decoration:none}
.lc .lnk a:hover{text-decoration:underline}
.lc .tip{font-size:11px;color:#bbb4ac;text-align:center;margin-top:20px}

/* App header */
.hd{background:#fff;border-bottom:1px solid var(--border);padding:20px 24px;text-align:center}
.hd h1{font-size:18px;font-weight:700;color:var(--text);letter-spacing:1px}
.hd p{font-size:12px;color:var(--text2);margin-top:2px}
.hd .top-right{position:absolute;top:16px;right:20px;display:flex;gap:8px;align-items:center}
.hd .top-right button{
  padding:5px 12px;border:1px solid var(--border);border-radius:6px;
  font-size:12px;cursor:pointer;background:var(--surface);color:var(--text);font-family:inherit;
}
.hd .top-right button:hover{background:var(--bg)}
.hd{position:relative}

/* Main */
.w{max-width:960px;margin:0 auto;padding:20px 16px}
.c{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.c h2{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text)}
textarea{
  width:100%;min-height:180px;padding:14px;border:1px solid var(--border);border-radius:6px;
  font-size:14px;line-height:1.6;font-family:inherit;resize:vertical;background:#faf8f6;transition:all .2s;
}
textarea:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(138,158,139,.12)}
.inf{font-size:12px;color:var(--text2);margin-top:6px;text-align:right}
.bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.btn{
  display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border:none;border-radius:6px;
  font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;
}
.bp{background:var(--primary);color:#fff}.bp:hover{background:var(--primary-hover)}
.bo{background:var(--bg);color:var(--text);border:1px solid var(--border)}.bo:hover{background:var(--border)}
.bd{background:var(--red);color:#fff}.bd:hover{background:#b05c56}

.s{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px}
.s>div{text-align:center;padding:12px 8px;border-radius:6px;background:var(--bg)}
.s .n{font-size:22px;font-weight:700}.s .l{font-size:11px;color:var(--text2);margin-top:2px}
.z1 .n{color:var(--text)}.z2 .n{color:var(--red)}.z3 .n{color:var(--yellow)}.z4 .n{color:var(--green)}

.fl{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.fl button{
  padding:3px 10px;border-radius:12px;font-size:11px;border:1px solid var(--border);
  cursor:pointer;background:var(--surface);color:var(--text);font-family:inherit;
}
.fl .on{background:var(--primary);color:#fff;border-color:var(--primary)}

.it{
  display:flex;align-items:flex-start;gap:8px;padding:8px 10px;
  border-bottom:1px solid #f0ebe6;font-size:13px;
}
.it:last-child{border-bottom:none}
.tg{flex-shrink:0;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;color:#fff;margin-top:2px}
.t1{background:var(--red)}.t2{background:var(--yellow)}.t3{background:var(--green)}
.wd{font-weight:600;color:var(--red)}.ct{font-size:11px;color:var(--text2);margin-left:6px}
.tp{font-size:11px;color:var(--green);margin-top:3px}

.hl{
  padding:12px;border:1px solid var(--border);border-radius:6px;
  font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;background:#faf8f6;
}
.hl .r{background:#f5e4e2;color:#b05c56;padding:1px 2px;border-radius:2px}
.hl .y{background:#f5ede0;color:#8f7a55;padding:1px 2px;border-radius:2px}
.ok{text-align:center;padding:20px;color:var(--green);font-size:14px}
.ft{text-align:center;padding:16px 0 32px;font-size:11px;color:#bbb4ac}

/* Admin panel */
.ap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.ap h2{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--text)}
.ap .tbl{width:100%;border-collapse:collapse;font-size:13px}
.ap .tbl th{padding:8px 10px;text-align:left;font-weight:500;color:var(--text2);font-size:11px;border-bottom:1px solid var(--border)}
.ap .tbl td{padding:8px 10px;border-bottom:1px solid #f0ebe6}
.ap .tbl tr:last-child td{border-bottom:none}
.ap input{width:200px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:#faf8f6}
.ap input:focus{outline:none;border-color:var(--primary)}
.ap .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}

@media(max-width:640px){
  .lc{padding:32px 24px}
  .hd{padding:16px 14px}.hd h1{font-size:16px}
  .w{padding:12px 10px}.c,.ap{padding:14px}
  textarea{min-height:140px}
  .s{grid-template-columns:repeat(3,1fr)}.s .n{font-size:18px}
  .bar .btn{flex:1;justify-content:center;font-size:12px}
}
</style>
</head>
<body>

<!-- Login -->
<div id="loginOv">
  <div class="lc" id="loginPanel">
    <div class="logo">🩺</div>
    <h1 id="lgTitle">违禁词检查</h1>
    <p class="sub" id="lgSub">大健康内容合规检测 · 团队内部工具</p>
    <div class="err" id="lgErr"></div>
    <div class="ok" id="lgOk"></div>
    <label for="lgUid">账号 / 优惠卡号</label>
    <input type="text" id="lgUid" placeholder="管理员输入账号，队员输入13位卡号" onkeydown="if(event.key==='Enter')doLogin()">
    <label for="lgPw">密码</label>
    <input type="password" id="lgPw" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" id="lgBtn" onclick="doLogin()">登 录</button>
    <div class="lnk" id="lgLnk"><a onclick="toggleMode()">队员注册</a></div>
    <div class="tip">管理员账号: tongtong</div>
  </div>
</div>

<!-- App -->
<div id="app">
<div class="hd">
  <h1>🩺 违禁词检查</h1>
  <p>大健康内容合规检测</p>
  <div class="top-right">
    <button id="adminBtn" style="display:none" onclick="showAdmin()">管理</button>
    <button onclick="logout()">退出</button>
  </div>
</div>
<div class="w">
  <div class="c">
    <textarea id="ta" placeholder="粘贴或输入自媒体文案"></textarea>
    <div class="inf">字数: <span id="cc">0</span> · Ctrl+Enter 检查</div>
    <div class="bar">
      <button class="btn bp" onclick="run()">🔍 开始检查</button>
      <button class="btn bo" onclick="clr()">清空</button>
      <button class="btn bo" onclick="demo()">示例</button>
      <button class="btn bo" onclick="demo2()">PDF</button>
    </div>
  </div>
  <div id="res" style="display:none">
    <div class="c">
      <div class="s">
        <div class="z1"><div class="n" id="st0">0</div><div class="l">违禁词</div></div>
        <div class="z2"><div class="n" id="st1">0</div><div class="l">禁用</div></div>
        <div class="z3"><div class="n" id="st2">0</div><div class="l">慎用</div></div>
        <div class="z4"><div class="n" id="st3">0</div><div class="l">可替换</div></div>
      </div>
    </div>
    <div class="c">
      <h2>高亮预览</h2>
      <div class="hl" id="hl"></div>
    </div>
    <div class="c">
      <h2>详细结果</h2>
      <div class="fl" id="fl"></div>
      <div id="lst"></div>
    </div>
  </div>
  <!-- Admin panel -->
  <div id="adminPanel" style="display:none">
    <div class="ap">
      <h2>👥 用户管理</h2>
      <div class="row">
        <input type="text" id="newUserCard" placeholder="13位优惠卡号" maxlength="13">
        <input type="password" id="newUserPw" placeholder="默认密码" style="width:120px">
        <button class="btn bp" onclick="addUser()">添加成员</button>
      </div>
      <div class="err" id="adminErr" style="font-size:12px;margin-bottom:8px"></div>
      <table class="tbl" id="userTable">
        <tr><th>优惠卡号</th><th>注册时间</th><th></th></tr>
        <tr><td colspan="3" style="text-align:center;color:var(--text2);padding:20px">暂无注册用户</td></tr>
      </table>
    </div>
  </div>
  <div class="ft">本工具仅供参考，请结合最新法规与平台规则进行最终审核。</div>
</div>
</div>

<script>
// ===== Auth =====
var MODE="login";
var ADMIN={user:"tongtong",pw:"221016"};

function toggleMode(){
  var err=document.getElementById("lgErr"),ok=document.getElementById("lgOk");
  err.textContent="";ok.textContent="";
  if(MODE==="login"){
    MODE="register";
    document.getElementById("lgTitle").textContent="队员注册";
    document.getElementById("lgSub").textContent="使用国珍优惠卡号注册";
    document.getElementById("lgUid").placeholder="13位优惠卡号";
    document.getElementById("lgBtn").textContent="注 册";
    document.getElementById("lgBtn").onclick=doRegister;
    document.getElementById("lgLnk").innerHTML='<a onclick="toggleMode()">已有账号？去登录</a>'
  }else{
    MODE="login";
    document.getElementById("lgTitle").textContent="违禁词检查";
    document.getElementById("lgSub").textContent="大健康内容合规检测 · 团队内部工具";
    document.getElementById("lgUid").placeholder="管理员输入账号，队员输入13位卡号";
    document.getElementById("lgBtn").textContent="登 录";
    document.getElementById("lgBtn").onclick=doLogin;
    document.getElementById("lgLnk").innerHTML='<a onclick="toggleMode()">队员注册</a>'
  }
}

async function hashPw(pw){
  var e=new TextEncoder().encode(pw);
  var b=await crypto.subtle.digest("SHA-256",e);
  return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,"0")}).join("")
}

function getUsers(){try{return JSON.parse(localStorage.getItem("ck_users")||"{}")}catch(e){return{}}}
function saveUsers(u){localStorage.setItem("ck_users",JSON.stringify(u))}

async function doRegister(){
  var err=document.getElementById("lgErr"),ok=document.getElementById("lgOk");
  err.textContent="";ok.textContent="";
  var card=document.getElementById("lgUid").value.trim();
  var pw=document.getElementById("lgPw").value;
  if(card.length!==13||!/^\d{13}$/.test(card)){err.textContent="优惠卡号必须是13位数字";return}
  if(pw.length<4){err.textContent="密码至少4位";return}
  var users=getUsers();
  if(users[card]){err.textContent="该卡号已注册，请登录";return}
  var h=await hashPw(pw);
  users[card]={pw:h,reg:new Date().toISOString()};
  saveUsers(users);
  ok.textContent="注册成功！请登录";
  setTimeout(function(){
    MODE="login";
    document.getElementById("lgTitle").textContent="违禁词检查";
    document.getElementById("lgSub").textContent="大健康内容合规检测 · 团队内部工具";
    document.getElementById("lgUid").placeholder="管理员输入账号，队员输入13位卡号";
    document.getElementById("lgBtn").textContent="登 录";
    document.getElementById("lgBtn").onclick=doLogin;
    document.getElementById("lgLnk").innerHTML='<a onclick="toggleMode()">队员注册</a>';
    document.getElementById("lgPw").value="";
  },1500)
}

async function doLogin(){
  var err=document.getElementById("lgErr");
  err.textContent="";
  var uid=document.getElementById("lgUid").value.trim();
  var pw=document.getElementById("lgPw").value;
  if(!uid||!pw){err.textContent="请输入账号和密码";return}
  // Admin check
  if(uid===ADMIN.user){
    if(pw!==ADMIN.pw){err.textContent="密码错误";return}
    localStorage.setItem("ck_session","admin:"+uid);
    enterApp(uid,true);
    return
  }
  // User check
  var users=getUsers();
  var u=users[uid];
  if(!u){err.textContent="该卡号未注册，请先注册";return}
  var h=await hashPw(pw);
  if(h!==u.pw){err.textContent="密码错误";return}
  localStorage.setItem("ck_session","user:"+uid);
  enterApp(uid,false)
}

function enterApp(uid,isAdmin){
  document.getElementById("loginOv").classList.add("hidden");
  document.getElementById("app").style.display="block";
  if(isAdmin){
    document.getElementById("adminBtn").style.display="";
    document.getElementById("adminPanel").style.display="none"
  }
}

function logout(){
  if(confirm("确定退出？")){localStorage.removeItem("ck_session");location.reload()}
}

// Auto login
(function(){
  var s=localStorage.getItem("ck_session");
  if(s&&s.startsWith("admin:"))enterApp(s.split(":")[1],true);
  else if(s&&s.startsWith("user:")){
    var uid=s.split(":")[1];
    if(getUsers()[uid])enterApp(uid,false)
  }
})();

// ===== Admin =====
function showAdmin(){
  var p=document.getElementById("adminPanel");
  p.style.display=p.style.display==="none"?"block":"none";
  renderUsers()
}
function renderUsers(){
  var users=getUsers();
  var keys=Object.keys(users);
  var tb=document.getElementById("userTable");
  if(keys.length===0){
    tb.innerHTML='<tr><th>优惠卡号</th><th>注册时间</th><th></th></tr><tr><td colspan="3" style="text-align:center;color:var(--text2);padding:20px">暂无注册用户</td></tr>';
    return
  }
  var h='<tr><th>优惠卡号</th><th>注册时间</th><th></th></tr>';
  for(var i=0;i<keys.length;i++){
    var k=keys[i];
    var d=users[k].reg?new Date(users[k].reg).toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"--";
    h+='<tr><td>'+k+'</td><td style="color:var(--text2);font-size:12px">'+d+'</td><td><button class="btn bo" style="padding:2px 8px;font-size:11px;color:var(--red)" onclick="delUser(\''+k+'\')">删除</button></td></tr>'
  }
  tb.innerHTML=h
}
function addUser(){
  var err=document.getElementById("adminErr");
  err.textContent="";
  var card=document.getElementById("newUserCard").value.trim();
  var pw=document.getElementById("newUserPw").value;
  if(card.length!==13||!/^\d{13}$/.test(card)){err.textContent="卡号必须是13位数字";return}
  if(pw.length<4){err.textContent="密码至少4位";return}
  var users=getUsers();
  if(users[card]){err.textContent="该卡号已存在";return}
  hashPw(pw).then(function(h){
    users[card]={pw:h,reg:new Date().toISOString()};
    saveUsers(users);
    document.getElementById("newUserCard").value="";
    document.getElementById("newUserPw").value="";
    err.style.color="var(--green)";
    err.textContent="添加成功！";
    renderUsers()
  })
}
function delUser(card){
  if(!confirm("确定删除 "+card+" ？"))return;
  var users=getUsers();
  delete users[card];
  saveUsers(users);
  renderUsers()
}

.lc h1{font-size:20px;font-weight:700;color:var(--primary);text-align:center;margin-bottom:4px}
.lc p{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px}
.lc label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text)}
.lc input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;transition:border .2s;margin-bottom:12px}
.lc input:focus{outline:none;border-color:var(--primary)}
.lc .btn{width:100%;padding:11px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--primary);color:#fff;transition:background .15s;margin-top:4px}
.lc .btn:hover{background:#0d6f60}
.lc .err{color:var(--red);font-size:12px;text-align:center;min-height:18px;margin-bottom:4px}
.lc .lnk{text-align:center;font-size:13px;margin-top:14px;color:var(--text2)}
.lc .lnk a{color:var(--primary);cursor:pointer;text-decoration:none}
.lc .lnk a:hover{text-decoration:underline}
.lc .ok{color:var(--green);font-size:12px;text-align:center;min-height:18px;margin-bottom:4px}

.w{max-width:960px;margin:0 auto;padding:20px 16px}
.c{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.c h2{font-size:16px;font-weight:600;margin-bottom:14px}
textarea{width:100%;min-height:200px;padding:14px;border:1px solid var(--border);border-radius:6px;font-size:14px;line-height:1.6;font-family:inherit;resize:vertical}
textarea:focus{outline:none;border-color:var(--primary)}
.inf{font-size:12px;color:var(--text2);margin-top:6px;text-align:right}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .12s}
.bp{background:var(--primary);color:#fff}.bp:hover{background:#0d6f60}
.bo{background:transparent;border:1px solid var(--border);color:var(--text)}.bo:hover{background:var(--bg)}
.s{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}

.t1{background:var(--red)}.t2{background:var(--yellow)}.t3{background:var(--green)}
.wd{font-weight:600;color:var(--red)}.ct{font-size:12px;color:var(--text2);margin-left:8px}

.hl .y{background:#fef3c7;color:#92400e;padding:1px 2px;border-radius:3px}
.ok{text-align:center;padding:24px;color:var(--green);font-weight:500}

.uinfo:hover{opacity:1;text-decoration:underline}
.hd{position:relative}

<script>
// ===== Auth =====
var MODE = "login";

function esc(s){
  var d=document.createElement("div");d.textContent=s;return d.innerHTML
}

function toggleMode(){
  var err=document.getElementById("lgErr"),ok=document.getElementById("lgOk");
  err.textContent="";ok.textContent="";
  if(MODE==="login"){
    MODE="register";
    document.getElementById("lgTitle").textContent="注册新用户";
    document.getElementById("lgSub").textContent="使用国珍优惠卡号注册";
    document.getElementById("lgPw2Label").style.display="block";
    document.getElementById("lgPw2").style.display="block";
    document.getElementById("lgBtn").textContent="注 册";
    document.getElementById("lgBtn").onclick=doRegister;
    document.getElementById("lgLnk").innerHTML='<a onclick="toggleMode()">已有账号？去登录</a>'
  }else{
    MODE="login";
    document.getElementById("lgTitle").textContent="🩺 违禁词检查";
    document.getElementById("lgSub").textContent="大健康内容合规检测 · 团队内部工具";
    document.getElementById("lgPw2Label").style.display="none";
    document.getElementById("lgPw2").style.display="none";
    document.getElementById("lgBtn").textContent="登 录";
    document.getElementById("lgBtn").onclick=doLogin;
    document.getElementById("lgLnk").innerHTML='<a onclick="toggleMode()">没有账号？注册新用户</a>'
  }
}

async function hashPw(pw){
  var e=new TextEncoder().encode(pw);
  var b=await crypto.subtle.digest("SHA-256",e);
  return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,"0")}).join("")
}

function getUsers(){try{return JSON.parse(localStorage.getItem("ck_users")||"{}")}catch(e){return{}}}
function saveUsers(u){localStorage.setItem("ck_users",JSON.stringify(u))}

async function doRegister(){
  var err=document.getElementById("lgErr"),ok=document.getElementById("lgOk");
  err.textContent="";ok.textContent="";
  var card=document.getElementById("lgCard").value.trim();
  var pw=document.getElementById("lgPw").value;
  var pw2=document.getElementById("lgPw2").value;
  if(card.length!==13||!/^\d{13}$/.test(card)){err.textContent="优惠卡号必须是13位数字";return}
  if(pw.length<4){err.textContent="密码至少4位";return}
  if(pw!==pw2){err.textContent="两次密码不一致";return}
  var users=getUsers();
  if(users[card]){err.textContent="该卡号已注册，请直接登录";return}
  var h=await hashPw(pw);
  users[card]={pw:h,reg:new Date().toISOString()};
  saveUsers(users);
  ok.textContent="注册成功！请登录";
  setTimeout(function(){
    MODE="login";
    document.getElementById("lgTitle").textContent="🩺 违禁词检查";
    document.getElementById("lgSub").textContent="大健康内容合规检测 · 团队内部工具";
    document.getElementById("lgPw2Label").style.display="none";
    document.getElementById("lgPw2").style.display="none";
    document.getElementById("lgBtn").textContent="登 录";
    document.getElementById("lgBtn").onclick=doLogin;
    document.getElementById("lgLnk").innerHTML='<a onclick="toggleMode()">没有账号？注册新用户</a>';
    document.getElementById("lgPw").value="";
  },1500)
}

async function doLogin(){
  var err=document.getElementById("lgErr");
  err.textContent="";
  var card=document.getElementById("lgCard").value.trim();
  var pw=document.getElementById("lgPw").value;
  if(!card||!pw){err.textContent="请输入卡号和密码";return}
  var users=getUsers();
  var u=users[card];
  if(!u){err.textContent="该卡号未注册，请先注册";return}
  var h=await hashPw(pw);
  if(h!==u.pw){err.textContent="密码错误";return}
  localStorage.setItem("ck_session",card);
  enterApp(card)
}

function enterApp(card){
  document.getElementById("loginOv").classList.add("hidden");
  document.getElementById("app").style.display="block";
  document.getElementById("uinfo").textContent=card+" 退出"
}

function logout(){
  if(confirm("确定退出登录？")){
    localStorage.removeItem("ck_session");
    location.reload()
  }
}

// Auto login
(function(){
  var s=localStorage.getItem("ck_session");
  if(s){
    var users=getUsers();
    if(users[s]){enterApp(s);return}
  }
})();

DB.sort(function(a,b){return b.w.length-a.w.length});
function es(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function run(){
  var ta=document.getElementById('ta'),text=ta.value;
  if(!text.trim()){document.getElementById('res').style.display='none';return}
  var h=[];
  for(var i=0;i<DB.length;i++){
    var e=DB[i],re=new RegExp(e.w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m;
    while((m=re.exec(text))!==null){h.push({w:m[0],x:m.index,s:e.s,k:e.k,g:U[e.w]||U[m[0].toLowerCase()]||''})}
  }
  h.sort(function(a,b){return a.x-b.x});
  var d=[];
  for(var i=0;i<h.length;i++){
    var r=h[i],p=d[d.length-1];
    if(p&&r.x>=p.x&&r.x<p.x+p.w.length){if(r.w.length>p.w.length)d[d.length-1]=r}
    else d.push(r)
  }
  var t=d.length,rn=0,yn=0,gn=0;
  for(var i=0;i<d.length;i++){if(d[i].s==='red')rn++;else if(d[i].s==='yellow')yn++;else gn++}
  document.getElementById('st0').textContent=t;
  document.getElementById('st1').textContent=rn;
  document.getElementById('st2').textContent=yn;
  document.getElementById('st3').textContent=gn;
  document.getElementById('res').style.display='block';
  var hl='',la=0;
  for(var i=0;i<d.length;i++){
    var r=d[i];
    if(r.x<la)continue;
    hl+=es(text.slice(la,r.x));
    hl+='<span class="'+(r.s==='red'?'r':'y')+'">'+es(r.w)+'</span>';
    la=r.x+r.w.length
  }
  hl+=es(text.slice(la));
  document.getElementById('hl').innerHTML=hl||'<span style="color:var(--green)">&#10004; 未发现违禁词</span>';
  var fb=document.getElementById('fl');

  for(var i=0;i<d.length;i++){
    var r=d[i],tc=r.s==='red'?'t1':r.s==='yellow'?'t2':'t3';
    var sl=L[r.s]||r.s;

    }
    var act='';
    if(sugText)act=' <button class="rbtn" onclick="rf('+i+','+r.x+',\''+r.w.replace(/'/g,"\\'")+'\',\''+sugText.replace(/'/g,"\\'")+'\')">替换为'+es(sugText)+'</button>';
    act=act.replace('class="rbtn"','class="rbtn rbg"');
    var sh=r.g?'<div class="tp">'+es(r.g)+'</div>':'';
    hh+='<div class="it" data-s="'+r.s+'"><span class="tg '+tc+'">'+sl+'</span><div><span class="wd">'+es(r.w)+'</span><span class="ct">'+r.k+'</span>'+sh+'<div>'+act+'</div></div></div>'
  }
  li.innerHTML=hh
  window._rds=d
}

function raf(){
  var ta=document.getElementById('ta');
  var d=window._rds||[];
  var text=ta.value;
  for(var i=d.length-1;i>=0;i--){
    var r=d[i];
    var sugText='';
    if(r.g){
      var m2=r.g.match(/【([^】]+)】/);
      if(m2&&m2[1])sugText=m2[1]
    }
    if(!sugText)continue;
    if(r.x<0||r.x>=text.length)continue;
    text=text.slice(0,r.x)+sugText+text.slice(r.x+r.w.length);
    for(var j=i-1;j>=0;j--){
      if(d[j].x>r.x)d[j].x-=r.w.length-sugText.length
    }
  }
  ta.value=text;
  document.getElementById('cc').textContent=text.length;
  run()
}

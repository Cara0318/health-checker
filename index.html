<style>
*{box-sizing:border-box;margin:0;padding:0}

body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.5}

.lc{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(61,55,48,.08);border:1px solid var(--border)}
.lc .logo{font-size:32px;text-align:center;margin-bottom:4px}

.lc label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:3px}
.lc input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;background:#faf8f6;margin-bottom:12px}
.lc input:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(138,158,139,.15)}
.lc .btn{width:100%;padding:10px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--primary);color:#fff;margin-top:4px;justify-content:center;text-align:center}
.lc .btn:hover{background:var(--ph)}
.lc .err{color:var(--red);font-size:12px;text-align:center;min-height:18px;margin-top:8px}
.lc .ok{color:var(--green);font-size:12px;text-align:center;min-height:18px}
.lc .lnk{text-align:center;font-size:13px;margin-top:10px;color:var(--text2)}
.lc .lnk a{color:var(--primary);cursor:pointer;text-decoration:none}
.lc .lnk a:hover{text-decoration:underline}
.lc .tip{font-size:11px;color:#bbb4ac;text-align:center;margin-top:14px}
.lc .adm{text-align:right;margin-top:8px;font-size:10px;color:#d5d0ca;cursor:pointer}
.lc .adm:hover{color:#bbb4ac}

.hd{background:#fff;border-bottom:1px solid var(--border);padding:18px 24px;text-align:center;position:relative}
.hd h1{font-size:18px;font-weight:700;color:var(--text);letter-spacing:1px}
.hd p{font-size:12px;color:var(--text2);margin-top:2px}
.hd .tr{position:absolute;top:14px;right:16px;display:flex;gap:6px}
.hd .tr button{padding:4px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;cursor:pointer;background:var(--surface);color:var(--text);font-family:inherit}
.hd .tr button:hover{background:var(--bg)}
.w{max-width:940px;margin:0 auto;padding:16px 12px}
.c{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.c h2{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text)}
textarea{width:100%;min-height:160px;padding:12px;border:1px solid var(--border);border-radius:6px;font-size:13px;line-height:1.6;font-family:inherit;resize:vertical;background:#faf8f6}
textarea:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(138,158,139,.12)}
.inf{font-size:11px;color:var(--text2);margin-top:4px;text-align:right}
.bar{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.bp{background:var(--primary);color:#fff}.bp:hover{background:var(--ph)}
.bo{background:var(--bg);color:var(--text);border:1px solid var(--border)}.bo:hover{background:var(--border)}
.s{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.s>div{text-align:center;padding:10px 6px;border-radius:6px;background:var(--bg)}
.s .n{font-size:20px;font-weight:700}.s .l{font-size:11px;color:var(--text2);margin-top:2px}
.z1 .n{color:var(--text)}.z2 .n{color:var(--red)}.z3 .n{color:var(--yellow)}.z4 .n{color:var(--green)}
.fl{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.fl button{padding:3px 9px;border-radius:10px;font-size:11px;border:1px solid var(--border);cursor:pointer;background:var(--surface);color:var(--text);font-family:inherit}
.fl .on{background:var(--primary);color:#fff;border-color:var(--primary)}
.it{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-bottom:1px solid #f0ebe6;font-size:13px}
.it:last-child{border-bottom:none}
.tg{flex-shrink:0;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;color:#fff;margin-top:2px}
.t1{background:var(--red)}.t2{background:var(--yellow)}.t3{background:var(--green)}
.wd{font-weight:600;color:var(--red)}.ct{font-size:11px;color:var(--text2);margin-left:6px}
.tp{font-size:11px;color:var(--green);margin-top:3px}
.hl{padding:10px;border:1px solid var(--border);border-radius:6px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;background:#faf8f6}
.hl .r{background:#f5e4e2;color:#b05c56;padding:1px 2px;border-radius:2px}
.hl .y{background:#f5ede0;color:#8f7a55;padding:1px 2px;border-radius:2px}
.ok{text-align:center;padding:16px;color:var(--green);font-size:13px}
.ft{text-align:center;padding:14px 0 28px;font-size:11px;color:#bbb4ac}
.ap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.ap h2{font-size:14px;font-weight:600;margin-bottom:12px}
.ap .tbl{width:100%;border-collapse:collapse;font-size:13px}
.ap .tbl th{padding:6px 8px;text-align:left;font-weight:500;color:var(--text2);font-size:11px;border-bottom:1px solid var(--border)}
.ap .tbl td{padding:6px 8px;border-bottom:1px solid #f0ebe6}
.ap input{width:180px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;background:#faf8f6}
.ap input:focus{outline:none;border-color:var(--primary)}
.ap .rw{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
@media(max-width:640px){
  .lc{padding:28px 20px}.hd{padding:14px}.hd h1{font-size:16px}
  .w{padding:10px 8px}.c{padding:12px}
  textarea{min-height:130px}.s{grid-template-columns:repeat(4,1fr)}
  .bar .btn{flex:1;justify-content:center;font-size:11px}
}
</style>

<body>

<div id="loginOv">
  <div class="lc">

</div>
<div class="w" id="w">

    <div class="inf">字数: <span id="cc">0</span> · Ctrl+Enter 检查</div>
    <div class="bar">
      <button class="btn bp" onclick="rn()">🔍 开始检查</button>
      <button class="btn bo" onclick="cl()">清空</button>

      <button class="btn bo" onclick="d2()">PDF</button>

  <div id="rs" style="display:none">

        <div class="z2"><div class="n" id="st1">0</div><div class="l">禁用</div></div>
        <div class="z3"><div class="n" id="st2">0</div><div class="l">慎用</div></div>

</div>

  <div id="adm" style="display:none">
    <div class="ap">
      <h2>账号管理</h2>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
        <div style="text-align:center;padding:10px;border-radius:6px;background:var(--bg)"><div style="font-size:20px;font-weight:700;color:var(--primary)" id="at1">0</div><div style="font-size:11px;color:var(--text2);margin-top:2px">注册用户</div></div>
        <div style="text-align:center;padding:10px;border-radius:6px;background:var(--bg)"><div style="font-size:20px;font-weight:700;color:var(--text)" id="at2">0</div><div style="font-size:11px;color:var(--text2);margin-top:2px">今日注册</div></div>
        <div style="text-align:center;padding:10px;border-radius:6px;background:var(--bg)"><div style="font-size:20px;font-weight:700;color:var(--green)" id="at3">0</div><div style="font-size:11px;color:var(--text2);margin-top:2px">预添加</div></div>
      </div>
      <div class="rw">
        <input type="text" id="nc" placeholder="13位卡号" maxlength="13">
        <input type="password" id="np" placeholder="密码" style="width:100px">
        <button class="btn bp" onclick="au()">添加用户</button>
      </div>
      <div class="err" id="ae" style="font-size:12px;margin-bottom:6px"></div>
      <table class="tbl" id="ut">
        <tr><th>卡号</th><th>注册时间</th><th>来源</th><th></th></tr>

      </table>

<script>
var A={u:"tongtong",p:"221016"};

function sa(){document.getElementById("adminBox").style.display="block";document.getElementById("adot").style.display="none"}
function ca(){document.getElementById("adminBox").style.display="none";document.getElementById("adot").style.display=""}

function hp(p){var e=new TextEncoder().encode(p);return crypto.subtle.digest("SHA-256",e).then(function(b){return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,"0")}).join("")})}
function gu(){try{return JSON.parse(localStorage.getItem("cu")||"{}")}catch(e){return{}}}
function su(u){localStorage.setItem("cu",JSON.stringify(u))}
function la(){
  var e=document.getElementById("le"),u=document.getElementById("au").value.trim(),p=document.getElementById("ap").value;
  e.textContent="";
  if(u!==A.u||p!==A.p){e.textContent="账号或密码错误";return}
  localStorage.setItem("cs","a:"+u);
  document.getElementById("loginOv").classList.add("hidden");document.getElementById("app").style.display="block";
  document.getElementById("w").style.display="none";document.getElementById("adm").style.display="block";ru()
}
async function lu(){
  var e=document.getElementById("le"),c=document.getElementById("uc").value.trim(),p=document.getElementById("up").value;
  e.textContent="";
  if(c.length!==13||!/^\d{13}$/.test(c)){e.textContent="卡号必须是13位数字";return}
  var us=gu(),u=us[c];
  if(!u){e.textContent="该卡号未注册，请先注册";return}
  var h=await hp(p);
  if(h!==u.p){e.textContent="密码错误";return}
  localStorage.setItem("cs","u:"+c);ea(c,false)
}
async function reg(){
  var e=document.getElementById("le"),o=document.getElementById("lo"),c=document.getElementById("uc").value.trim(),p=document.getElementById("up").value;
  e.textContent="";o.textContent="";
  if(c.length!==13||!/^\d{13}$/.test(c)){e.textContent="卡号必须是13位数字";return}
  if(p.length<4){e.textContent="密码至少4位";return}
  var us=gu();
  if(us[c]){e.textContent="该卡号已注册，请登录";return}
  us[c]={p:await hp(p),r:new Date().toISOString()};su(us);
  o.textContent="注册成功！现在去登录吧"
}
function ea(u,a){
  document.getElementById("loginOv").classList.add("hidden");document.getElementById("app").style.display="block";
  if(a){document.getElementById("adminBtn").style.display="none";document.getElementById("w").style.display="none";document.getElementById("adm").style.display="block";ru()}
}
function lo(){if(confirm("确定退出？")){localStorage.removeItem("cs");location.reload()}}


function ad(){var p=document.getElementById("adm");p.style.display=p.style.display==="none"?"block":"none";ru()}
function ru(){var us=gu(),ks=Object.keys(us),t=document.getElementById("ut"),today=new Date().toISOString().slice(0,10),tc=0,pc=0;
  document.getElementById("at1").textContent=ks.length;
  for(var i=0;i<ks.length;i++){if(us[ks[i]].r&&us[ks[i]].r.slice(0,10)===today)tc++;if(us[ks[i]].p&&!us[ks[i]].r)pc++}
  document.getElementById("at2").textContent=tc;document.getElementById("at3").textContent=pc;
  if(!ks.length){t.innerHTML='<tr><th>卡号</th><th>注册时间</th><th>来源</th><th></th></tr><tr id="emptyRow"><td colspan="4" style="text-align:center;color:var(--text2);padding:20px">还没有注册用户<br><span style="font-size:11px">在上方输入卡号添加预注册，或等用户自行注册</span></td></tr>';return}
  var h='<tr><th>卡号</th><th>注册时间</th><th>来源</th><th></th></tr>';
  for(var i=0;i<ks.length;i++){
    var d=us[ks[i]].r?new Date(us[ks[i]].r).toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"--";
    var src=us[ks[i]].r?"用户注册":"预添加";
    h+='<tr><td>'+ks[i]+'</td><td style="color:var(--text2);font-size:12px">'+d+'</td><td style="font-size:11px;color:var(--text2)">'+src+'</td><td><button class="btn bo" style="padding:1px 6px;font-size:10px;color:var(--red)" onclick="du(\''+ks[i]+'\')">删除</button></td></tr>'}
  t.innerHTML=h}
function au(){var e=document.getElementById("ae"),c=document.getElementById("nc").value.trim(),p=document.getElementById("np").value;e.textContent="";if(c.length!==13||!/^\d{13}$/.test(c)){e.textContent="卡号13位数字";return}if(p.length<4){e.textContent="密码至少4位";return}var us=gu();if(us[c]){e.textContent="已存在";return}hp(p).then(function(h){us[c]={p:h,r:new Date().toISOString()};su(us);document.getElementById("nc").value="";document.getElementById("np").value="";e.style.color="var(--green)";e.textContent="添加成功";ru()})}
function du(c){if(!confirm("删除 "+c+"？"))return;var us=gu();delete us[c];su(us);ru()}

var D=[
{k:'绝对化用语',s:'red',w:'最|第一|首个|首选|顶级|王者|冠军|万能|100%|百分百|零风险|绝对|唯一|永久|终身|全网|全国|全球|所有|全部|完全|任何|第一品牌|首创|独创|遥遥领先|绝无仅有|史无前例|空前绝后|登峰造极|举世无双|无人能及|国家级|最高级|最好|最佳|极佳|极致|完美|王牌|超级|行业第一|行业领先|销量第一|销量冠军|领导者|领导品牌|巅峰|天花板|无与伦比|无可替代|独一无二|效果最好|质量最好|品质最佳'.split('|')},
{k:'治疗功效',s:'red',w:'治疗|治愈|治愈率|根治|疗效|痊愈|康复|缓解症状|抗炎|消炎|抗菌|杀菌|抑菌|抗癌|抗肿瘤|抗病毒|抗过敏|抗衰老|排毒|解毒|消除|清除|抑制|激活|修复|再生|重建|恢复|提高免疫力|增强免疫力|调节免疫力|提升免疫力|改善体质|延年益寿|延缓衰老|逆转|防止|预防|防治|阻断|抵抗|降糖|降压|降脂|降尿酸|降三高|止痛|镇痛|止咳|化痰|平喘|通便|润肠|养胃|护肝|补肾|健脾|祛湿|活血|化瘀|开胃|消食|安神|助眠|催眠|消炎止痛|清热解毒|消肿|利尿|降火|祛火|排毒养颜|调理|调养|养护|保护|改善睡眠|改善皮肤|改善肠胃|辅助治疗|辅助改善|药用价值'.split('|')},
